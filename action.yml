# action.yml
name: "CFN Cost Commenter"
description: "Detects changed CloudFormation templates, computes costs, and comments on the PR"
inputs:
  github-token:
    description: "GitHub token with repo write permissions"
    required: true
    default: ${{ github.token }}
  api-key:
    description: "CloudPostive API key for cost estimation"
    required: true
  log-level:
    description: "Logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)"
    required: false
    default: "INFO"
runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - ${{ inputs.github-token }}
    - ${{ inputs.api-key }}
